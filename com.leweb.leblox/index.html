<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LEBlox Tester HTML</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* LOADING SCREEN OVERLAY */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0c12;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loading-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .loading-content {
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        .loading-logo svg {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid rgba(59,130,246,0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .loading-subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 0.5px;
            color: #eef2ff;
        }
        .loading-timer {
            font-size: 1rem;
            color: #3b82f6;
            margin-top: 15px;
            font-weight: 600;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MAIN CONTENT (hidden initially) */
        .main-content {
            display: none;
            opacity: 0;
            animation: appFadeIn 0.5s ease forwards;
        }
        .main-content.visible {
            display: block;
        }
        @keyframes appFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body {
            background: #0a0c12;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #eef2ff;
        }
        .launcher-card {
            background: rgba(18, 22, 32, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 90%;
            margin: 0 auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .launcher-logo svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            margin-bottom: 1rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn:last-of-type {
            margin-bottom: 0;
        }
        .btn-start {
            background: #3b82f6;
            color: white;
        }
        .btn-start:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn-download {
            background: #1e1f2c;
            border: 1px solid #3a3a4a;
            color: #eef2ff;
        }
        .btn-download:hover {
            background: #2a2b3a;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            opacity: 0.5;
        }
        @media (max-width: 480px) {
            .launcher-card {
                padding: 1.8rem;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-logo">
                <svg viewBox="0 0 100 100" fill="none">
                    <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#logoGrad)" stroke="currentColor" stroke-width="2"/>
                    <path d="M35 45 L50 30 L65 45" stroke="white" stroke-width="3" fill="none"/>
                    <path d="M35 55 L50 70 L65 55" stroke="white" stroke-width="3" fill="none"/>
                    <circle cx="50" cy="50" r="8" fill="white" opacity="0.9"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6"/>
                            <stop offset="100%" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="loading-spinner"></div>
            <h2 class="loading-title">LEBlox</h2>
            <p class="loading-subtitle">Loading index.html...</p>
            <div class="loading-timer" id="loadingTimer">10</div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <div class="launcher-card">
            <div class="launcher-logo">
                <svg viewBox="0 0 100 100" fill="none">
                    <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#logoGrad2)" stroke="currentColor" stroke-width="2"/>
                    <path d="M35 45 L50 30 L65 45" stroke="white" stroke-width="3" fill="none"/>
                    <path d="M35 55 L50 70 L65 55" stroke="white" stroke-width="3" fill="none"/>
                    <circle cx="50" cy="50" r="8" fill="white" opacity="0.9"/>
                    <defs>
                        <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6"/>
                            <stop offset="100%" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1>LEBlox Tester HTML</h1>
            <button class="btn btn-start" id="runHtmlBtn">🚀 Run HTML</button>
            <a href="LEBlox.com/LEBlox.zip" class="btn btn-download">📦 Download LEBlox.zip</a>
            <div class="footer">Run HTML opens the app in a new tab.<br>Download gets web.html, page.css, script.js</div>
        </div>
    </div>

    <script>
        // 10-second loading screen with countdown
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingTimerElement = document.getElementById('loadingTimer');
        const mainContent = document.getElementById('mainContent');
        
        let seconds = 10;
        
        const countdownInterval = setInterval(() => {
            seconds--;
            loadingTimerElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdownInterval);
                // Fade out loading screen
                loadingOverlay.classList.add('fade-out');
                // Show main content
                mainContent.style.display = 'block';
                mainContent.classList.add('visible');
                // Remove loading overlay after animation
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 500);
            }
        }, 1000);
        
        // Run HTML button
        document.getElementById('runHtmlBtn').addEventListener('click', function() {
            window.open('LEBlox.com/web.html', '_blank');
        });
    </script>
</body>
</html>
