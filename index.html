<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LEBlox Tester HTML</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c12;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef2ff;
        }
        .launcher-card {
            background: rgba(18, 22, 32, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 90%;
        }
        .launcher-logo svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            margin-bottom: 1rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn:last-of-type {
            margin-bottom: 0;
        }
        .btn-start {
            background: #3b82f6;
            color: white;
        }
        .btn-start:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn-download {
            background: #1e1f2c;
            border: 1px solid #3a3a4a;
            color: #eef2ff;
        }
        .btn-download:hover {
            background: #2a2b3a;
            transform: scale(1.02);
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            opacity: 0.5;
        }
        @media (max-width: 480px) {
            .launcher-card {
                padding: 1.8rem;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="launcher-card">
        <div class="launcher-logo">
            <svg viewBox="0 0 100 100" fill="none">
                <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#logoGrad)" stroke="currentColor" stroke-width="2"/>
                <path d="M35 45 L50 30 L65 45" stroke="white" stroke-width="3" fill="none"/>
                <path d="M35 55 L50 70 L65 55" stroke="white" stroke-width="3" fill="none"/>
                <circle cx="50" cy="50" r="8" fill="white" opacity="0.9"/>
                <defs>
                    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6"/>
                        <stop offset="100%" stop-color="#8b5cf6"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <h1>LEBlox Tester HTML</h1>
        <button class="btn btn-start" id="runHtmlBtn">🚀 Run HTML</button>
        <a href="LEBlox.com/LEBlox.zip" class="btn btn-download">📦 Download LEBlox.zip</a>
        <div class="footer">Run HTML opens the app in a new tab.<br>Download gets web.html, page.css, script.js</div>
    </div>

    <script>
        document.getElementById('runHtmlBtn').addEventListener('click', function() {
            window.open('LEBlox.com/web.html', '_blank');
        });
    </script>
</body>
</html>
